spring:
  config:
    import: optional:file:/app/settings/env.properties
  data:
    redis:
      host: ${REDIS_HOST_NAME}
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_HOST}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform:
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none
    show-sql: false
temp:
  filePath: src/main/resources/
logging.level:
  org.hibernate.type: info
decorator:
  datasource:
    p6spy:
      enable-logging: true
