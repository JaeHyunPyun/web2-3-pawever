spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  config:
    import: optional:file:.env[.properties]
  application:
    name: pawEver
  profiles:
    default: local
  task:
    scheduling:
      pool:
        size: 5
  jwt:
    secret: ${JWT_SECRET_KEY}
    accessTokenExpirationTime: ${ACCESSTOKEN_EXPIRATION_TIME}   #테스트용 : 3분(180000)
    refreshTokenExpirationTime: ${REFRESHTOKEN_EXPIRATION_TIME} #테스트용 : 5분(300000)
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true
logging:
  config: classpath:logback-spring.xml
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

openapi:
  service-key: ${OPENAPI_SERVICE_KEY}
kakao:
  api:
    key: ${KAKAO_REST_API_KEY}
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_ACCESS_KEY}
    s3:
      bucket-name: paweverbucket
    region:
      static: ap-northeast-2
    stack:
      auto: false
tosspayments:
    secret-key: ${TOSSPAYMENTS_SECRET_KEY}
paw:
  user:
    default-image-url: ${PAW_USER_DEFAULT_IMAGE_S3_URL}






