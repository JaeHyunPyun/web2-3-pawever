spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  config:
    import: optional:file:.env[.properties]
  application:
    name: pawEver
  profiles:
    default: local
  task:
    scheduling:
      pool:
        size: 5
  jwt:
    secret: ${JWT_SECRET_KEY}
    accessTokenExpirationTime: ${ACCESSTOKEN_EXPIRATION_TIME}   #테스트용 : 3분(180000)
    refreshTokenExpirationTime: ${REFRESHTOKEN_EXPIRATION_TIME} #테스트용 : 5분(300000)
logging:
  config: classpath:logback-spring.xml
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
        - name: PAWEVER API
          url: /docs/openapi3.yaml
openapi:
  service-key: ${OPENAPI_SERVICE_KEY}
kakao:
  api:
    key: ${KAKAO_REST_API_KEY}
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_ACCESS_KEY}
    s3:
      bucket-name: paweverbucket
    region:
      static: ap-northeast-2
    stack:
      auto: false





