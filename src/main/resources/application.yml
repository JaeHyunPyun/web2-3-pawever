spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: pawEver
  profiles:
    default: local
  task:
    scheduling:
      pool:
        size: 5
  jwt:
    secret: ${JWT_SECRET_KEY}
    accessTokenExpirationTime: ${accessToken_expiration_time}   #테스트용 : 3분(180000)
    refreshTokenExpirationTime: ${refreshToken_expiration_time} #테스트용 : 5분(300000)
logging:
  config: classpath:logback-spring.xml
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
openapi:
  service-key: ${OPENAPI_SERVICE_KEY}
kakao:
  api:
    key: ${KAKAO_REST_API_KEY}





