name: CI

on:
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  # build(test포함) 진행
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4
      - name: JDK 17버전 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Redis 설치
        uses: supercharge/redis-github-action@1.1.0
        with:
          redis-version: 6
      - name: 테스트용 .env 파일 만들기
        run: echo "${{ secrets.ENV_TEST }}" > .env
      - name: RestDocs 디렉토리 생성 및 권한 설정
        run: |
            mkdir -p build/generated-snippets
            chmod -R 777 build/generated-snippets
      - name: Build and run tests
        run: ./gradlew clean build --no-daemon

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./gradlew
      - name: Build and run tests
        run: ./gradlew clean build
      - name: 테스트 결과를 PR에 코멘트로 등록
        uses: EnricoMi/publish-unit-test-result-action@v1
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
      - name: 테스트 실패 시, 실패한 코드 라인에 Check 코멘트를 등록
        uses: mikepenz/action-junit-report@v3
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          token: ${{ github.token }}

  close_pr:
    runs-on: ubuntu-latest
    needs: build
    if: failure()  # build(test포함) 실패시 pr 닫기
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install GitHub CLI
        run: sudo apt update && sudo apt install gh -y

      - name: Close PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base develop --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr close "$PR_NUMBER" --comment "PR is being closed as part of CI pipeline."
          else
            echo "No open PRs to close."
          fi
